---
layout: default
title: "Home"
---

<div class="posts">
  {% for post in site.posts %}
    <article>
      {% include meta.html post=post %}
      
      <div class="entry">
        {{ post.excerpt }}
      </div>

      <footer class="button">
        <a href="{{ post.url | relative_url }}">read more</a>
      </footer>
    </article>
  {% endfor %}
</div>
