---
layout: default
title: "Home"
---

{% assign recent_posts = site.posts | slice: 0, 4 %}

{% for post in recent_posts %}
  <article>
    {% include meta.html post=post %}
    
    <div class="entry">
      {{ post.excerpt }}
    </div>

    <footer class="button">
      <a href="{{ post.url | relative_url }}">read more</a>
    </footer>
  </article>
{% endfor %}
