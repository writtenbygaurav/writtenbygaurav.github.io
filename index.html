---
layout: default
title: "Home"
---

<div class="posts">
  {% for post in site.posts limit:4 %}
    <article>
      {% include meta.html post=post %}
      
      <div class="entry">
        {{ post.excerpt }}
      </div>

      {% if post.content contains site.excerpt_separator %}
        <footer class="button">
          <a href="{{ post.url | relative_url }}">read more</a>
        </footer>
      {% endif %}
    </article>
  {% endfor %}
</div>
