layout: page

tab_title: "Home"
permalink: /
---

<div class="posts">
{% for post in site.posts limit:4 %}
  <article>
    <header>
      <small>{{ post.date | date: "%B %d, %Y" }}</small>
      <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
    </header>
    
    <div class="entry">
      {{ post.excerpt }}
    </div>

    <footer class="button" style="margin-bottom: 2em;">
      <a href="{{ post.url | relative_url }}">Read more →</a>
    </footer>
  </article>
{% endfor %}
</div>
