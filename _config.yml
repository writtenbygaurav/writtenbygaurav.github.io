title: "writtenbygaurav"
author: "Gaurav"
description: "write stuff idk"
permalink: /:title/
lang: "en"
excerpt_separator: "<!--more-->"
date_format: "%B %d, %Y"

# Layout
show_excerpts: true
show_frame: false
show_sidebar: false
show_minimal: false

# Pagination Settings
paginate: 4
paginate_path: "/"

# Menu
navigation:
  - {url: "/archive/", title: "Archive"}
  - {url: "/about/", title: "About Me"}

external:
  - {title: Mail, icon: envelope, url: "mailto:write@gauravwrites.com"}
  - {title: Mastodon, icon: mastodon, url: "https://mastodon.social/@gauravwrites"}

plugins:
 - jekyll-feed
 - jekyll-paginate
